  - "Claude"
  # Add any others actually used, e.g. "ChatGPT", "GitHub Copilot", "Cursor"

ai_usage_summary: |
  Used Claude throughout development for: debugging pipeline errors (module
  imports, file-path resolution, CSV encoding issues), fixing CSV
  format/header compliance against the submission spec, designing and
  implementing the rule-based, template-driven reasoning generator (which
  reuses each candidate's own matched-skill data from the scoring step --
  no candidate data was sent to any external LLM API during ranking),
  validating outputs against validate_submission.py, and reviewing the
  honeypot self-check methodology. All scoring, trust/anomaly detection,
  and ranking logic in rank.py was engineered and tested by the team.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Two-phase rule-based ranker. Phase 1 cleans and de-duplicates the 100K
  candidate pool (near-duplicate resume clustering via headline+summary+
  career-text concatenation) and engineers features: total years of
  experience, role/title signals, and 23 behavioral signals from the
  redrob_signals object. Phase 2 scores each candidate on three independent
  components -- skill match against the JD's frozen must-have/preferred
  skill lists, experience relevance, and a behavioral signal score -- then
  applies a trust layer that flags anomalies (experience-mismatch,
  behavioral-outlier, skill-text inconsistency, etc.) and computes a
  fake-probability and trust tier per candidate, penalizing or excluding
  high-risk profiles before final ranking. Reasoning strings for the top
  100 are generated with a deterministic template that surfaces each
  candidate's actual matched must-have skills, experience, and one honest
  concern or strength signal -- no free-text generation, no LLM calls.
  End-to-end runtime on the full 100K pool: ~27 seconds on CPU.

